<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <title>vault</title>
    <link rel="stylesheet" type="text/css" href="monokai-sublime.css" />
    <link rel="stylesheet" type="text/css" href="application.css" />
    <script defer src="highlight.min.js"></script>
    <script defer src="application.js"></script>
    <script defer src="init.js"></script>
    <script defer data-api="/zk/api/event" src="/zk/js/script.js"></script>
  </head>

  <body>
    <ul id="messages"></ul>
    <div id="key">
      <div id="pointer" class="hidden"></div>
      <div id="box1">
        <a href="/about" class="logo"></a>
      </div>
      <div id="box2">
        <button class="save function button-picture">Save</button>
        <button class="new function button-picture">New</button>
        <button class="duplicate function button-picture">Duplicate & Edit</button>
        <button class="raw function button-picture">Just Text</button>
        <button class="twitter function button-picture">Twitter</button>
        <button class="copy function button-text">Copy URL</button>
        <button class="delete function button-text">Delete</button>
      </div>
      <div id="box3" class="hidden">
        <div class="label"></div>
        <div class="shortcut"></div>
      </div>
    </div>
    <div id="auth-overlay" class="hidden">
      <form id="auth-form" class="auth-modal">
        <label for="auth-input">Secret key</label>
        <input id="auth-input" type="password" autocomplete="off" />
        <div class="auth-actions">
          <button type="submit">OK</button>
          <button type="button" id="auth-cancel">Cancel</button>
        </div>
      </form>
    </div>
    <div id="linenos"></div>
    <pre id="box" class="hljs hidden" tabindex="0"><code></code></pre>
    <textarea spellcheck="false" class="hidden"></textarea>
  </body>
</html>
